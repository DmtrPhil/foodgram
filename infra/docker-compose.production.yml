volumes:
  pg_data:
  static:
  media:

services:
  db:
    container_name: foodgram-db
    image: postgres:13.10
    env_file: ../.env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    container_name: foodgram-back
    image: dmtrphil/foodgram_backend
    env_file: ../.env
    depends_on:
      - db
    volumes:
      - static:/app/collected_static
      - media:/app/media
    ports:
      - "8000:8000"
  frontend:
    container_name: foodgram-front
    image: dmtrphil/foodgram_frontend
    volumes:
      - static:/static/
  nginx:
    container_name: foodgram-proxy
    image: dmtrphil/foodgram_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/static/
      - media:/media/
    depends_on:
      - backend
